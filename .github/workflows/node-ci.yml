name: Node.js CI
# on: [push]
on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                node-version: "22"

            - name: Install dependencies
              run: npm install

            - name: Run tests
              run: npm test
