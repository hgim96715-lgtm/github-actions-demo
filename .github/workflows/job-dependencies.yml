name: Job Dependencies
on: [push]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            
            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                node-version: "22"
            
            - name: Install dependencies
              run: npm install
            
            - name: Run tests
              run: npm test
            
            - name: Build project
              run: |
               mkdir dist
               echo "Build artifact create at $(date)" > dist/build.txt
            
            - name: Upload build artifact
              uses: actions/upload-artifact@v6
              with:
                name: dist-files
                path: dist
    
    deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Download artifact
              uses: actions/download-artifact@v7
              with:
                name: dist-files
                path: dist

            - name: Deploy project
              run: |
                echo  "Deploying project..."
                ls -R dist
                echo "Deployment successful!"

